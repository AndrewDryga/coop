name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo. Set it explicitly rather than inheriting
# the (mutable) repo default, so a later default change can't silently grant write.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # don't leave the token in .git/config for later steps
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod # pin the toolchain to the repo, not a floating "stable"
          cache: false # no Actions cache → no cache-poisoning surface (the build is zero-dep)
      - name: gofmt
        run: |
          gofmt -l . | (! grep .) || { echo "needs gofmt -w ."; exit 1; }
      - name: vet
        run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0 # pinned, not @latest
          staticcheck ./...
      - name: test
        run: go test ./...
      - name: build
        run: go build ./...
      - name: shellcheck
        run: shellcheck install.sh

  # Exercise the real container boundary (coop doctor) per runtime, so a change that
  # breaks isolation or a runtime's run-args fails CI. (The fork-merge hardening test
  # already runs in `check` via `go test`.) docker and podman (rootless on the runner)
  # are both blocking. Apple's `container` needs macOS 26+ runners, so it isn't covered
  # here yet.
  doctor:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [docker, podman]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: install podman
        if: matrix.runtime == 'podman'
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: build
        run: go build -o coop .
      - name: doctor
        run: ./coop doctor
        env:
          COOP_RUNTIME: ${{ matrix.runtime }}
