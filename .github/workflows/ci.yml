name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
      - name: gofmt
        run: |
          gofmt -l . | (! grep .) || { echo "needs gofmt -w ."; exit 1; }
      - name: vet
        run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: test
        run: go test ./...
      - name: build
        run: go build ./...
      - name: shellcheck
        run: shellcheck install.sh
