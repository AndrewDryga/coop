name: pages

# Deploy the static site in site/ to GitHub Pages. No build step — the site is
# hand-written HTML/CSS/JS with a vendored asciinema-player; this job just uploads it.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish, but only keep the newest queued one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      # actions/upload-pages-artifact is a composite that nests a tag-pinned
      # actions/upload-artifact, which this repo's "every action SHA-pinned" policy
      # rejects. Replicate it inline: its exact tar, then a SHA-pinned upload-artifact.
      # The artifact MUST be named "github-pages" so deploy-pages picks it up.
      - name: Archive the site into a Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
