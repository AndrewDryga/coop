name: release

on:
  push:
    tags: ['v*']

# Least privilege at the top; the release job is granted what it needs, below.
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload the built assets
      id-token: write # keyless cosign signing + build provenance (Sigstore OIDC)
      attestations: write # record the build-provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false # goreleaser publishes via GITHUB_TOKEN (env), not git creds
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6
        with:
          go-version-file: go.mod # reproducible toolchain for the published binaries
          cache: false # no cache → a poisoned cache can't reach a release artifact
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1' # pin cosign so its CLI defaults can't drift the release
      # The release body is CHANGELOG.md's top section — the story /release finalized for
      # this tag. Empty notes fail the job loudly: tagging with an unfinalized changelog
      # is the mistake that shipped v3.0.0 with dependabot noise as its release page.
      - name: Extract release notes from CHANGELOG.md
        run: |
          awk '/^## /{n++; next} n==1' CHANGELOG.md | grep -v '^<!--' > /tmp/release-notes.md
          if ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "CHANGELOG.md's top section is empty — finalize it (see the /release skill) before tagging" >&2
            exit 1
          fi
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: 'v2.16.0' # pin the goreleaser binary, not a floating "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Cryptographic proof each archive was built by this workflow. Verify with:
      #   gh attestation verify coop_<ver>_<os>_<arch>.tar.gz --repo AndrewDryga/coop
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/coop_*.tar.gz'
