# .agent/loop.yaml — configuration for `coop loop` (committed; edit to taste).
# Every key is optional — omit it (or a whole section) to use coop's built-in default, noted below.
# Models use coop's target grammar: provider[:model][/effort][@account].
# Sections are in loop order: preflight (before) → work → between (after each task) → signoff (at the end).
#
# This copy is coop dogfooding coop, on two cross-vendor tiers at max effort: the FRONTIER
# pair (Fable 5 ⇄ GPT-5.6 Sol, failing over to each other) leads the work and the signoff; the
# FAST pair (GPT-5.6 Luna ⇄ Opus 4.8) audits each finished task between iterations. Grok 4.5
# sits outside both as the preset's critic — the second critical opinion. No gemini for now.

preflight:
  # Run the one-shot pre-loop queue tidy (unblocks tasks whose decision.md now has a Resolution;
  # works no task, changes no code). Default: false.
  enabled: true

  # Extra instructions APPENDED to the built-in cleanup prompt. Default: nothing appended.
  prompt: |
    Also hold every 00_todo task to the self-containment contract (AGENTS.md): a fresh agent
    must be able to work it from task.md + the BOOT files alone. One that can't stand on its
    own is not ready — move it to 50_blocked with a decision.md naming exactly what's missing
    (problem? acceptance criteria? approach?). Better one blocked task than one burned iteration.

work:
  # Model ladder for work iterations. Each rung is a TARGET (claude:opus, codex:gpt-5.6-luna) or a
  # PRESET NAME (frontier — the iteration runs under that preset: its lead ladder + roles). coop
  # rotates to the next rung on a rate limit (a preset rung's own ladder first). A bare provider
  # word (claude/codex/gemini/grok) is a target; any other bare word must name a preset.
  # Default: the agent on the command line (`coop loop claude`) or a --preset's lead.
  #
  # One rung: the frontier preset already carries the failover pair — Fable 5/xhigh leading
  # with GPT-5.6 Sol/xhigh as the cross-vendor twin — plus the thinker/critic/fast roles.
  agent: [frontier]

  # Advanced: a raw command run each iteration instead of coop's agent form (disables the
  # signoff, preflight, and between passes). Default: coop's built-in agent form.
  #command: []

between:
  # Opt-in audit run after EACH completed task (may reopen it before the loop moves on). Default: off.
  enabled: true

  # Audit model ladder. Default: the signoff model.
  # The FAST pair: Luna and Opus 4.8 at xhigh, failing over to each other — exactly the
  # tier a focused per-task audit wants.
  agent: [codex:gpt-5.6-luna/xhigh, claude:claude-opus-4-8/xhigh]

  # The per-task audit prompt — SET it here (between has no built-in; required when enabled).
  # coop prepends the just-finished task's id + folder, so "the task named above" is exact.
  prompt: |
    Audit ONLY the task named above — nothing else. Hold it against its own task.md,
    trusting evidence over prose:
    - Every acceptance criterion is demonstrably met — point at the commit, diff, or test that
      proves it, not at a claim in log.md.
    - The failure path is tested, not just the happy path.
    - The gate is green on the committed tree (`make check`), and `make align` leaves no diff.
    - The commit says WHY, and state.md was refreshed as the final step.
    Verdict: pass → append one line to the task's log.md ("audit: pass — <evidence>"). Fail →
    move the folder back to 10_in_progress/ and append the concrete gap (what to fix, where)
    to log.md. Never widen scope beyond the audited task.

signoff:
  # Work→signoff rounds before a task the signoff keeps reopening is blocked for a human.
  # Batch-scaled: the real cap is clamp(tasks_done / 2, 3, rounds). Default: 5.
  #rounds: 5

  # Model ladder for the final signoff pass. The FRONTIER pair reversed: Sol/xhigh reviews first —
  # usually a different vendor than whoever led the work, so the lead's blind spots aren't
  # the reviewer's — with Fable 5/xhigh picking it up when codex is limited.
  agent: [codex:gpt-5.6-sol/xhigh, claude:claude-fable-5/xhigh]

  # Extra signoff instructions/checks, APPENDED to coop's built-in senior review (which always
  # runs — it checks goal, standards, failure-path tests, polish, and the gate). The reviewer
  # applies these on top and reopens a task that fails one. Default: nothing appended.
  prompt: |
    - `make check` is the gate (gofmt + go vet + tests + docs-check); it must pass across the whole repo.
    - `make align` passes (trailing-comment alignment) — reopen the task if it doesn't.
    - If internal/cli/help.go changed, the generated docs were regenerated (`make docs`) and committed.
    - A user-visible CLI change updated the site casts/docs and added a CHANGELOG Unreleased entry.
    - No new Go dependency without a one-line justification in the commit message.
    - A correction from the human during the task became a rule in .agent/rules/ — flag any that
      were applied once and not recorded.
    - A reusable lesson that caused a reopen this run — a recurring mistake, or a cross-cutting trap
      the work agent hit — has a DRAFT card in .agent/kb/inbox/ (a fresh agent should not have to
      re-learn it). Flag any such lesson that left no card. Do NOT promote cards into .agent/kb/
      yourself — that's a human's git-reviewed move.
    - No stray working files left behind: the tree is clean after the commit (git status) and
      nothing untracked was smuggled in beside the change.
