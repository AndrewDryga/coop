# coop preset — an orchestration recipe: which agent LEADS a session, and which
# ROLES it can route work to. Edit this file, then run or inspect it:
#   Run:      coop claude --preset frontier
#             coop loop --preset frontier
#   Inspect:  coop presets frontier
#   Format:   coop help presets
# An explicit target on the command line (claude:opus@work) overrides the lead +
# ladder. Model ids: coop models. Accounts (logins): coop credentials. A preset
# names models and accounts, never the secrets themselves.

# lead — REQUIRED: the agent that leads the session, as a TARGET or a fallback ladder.
lead:
  # agent — REQUIRED. A target: provider[:model][@account], or a LIST of them (a fallback
  # ladder, even cross-provider). A bare provider:model runs on EVERY signed-in account
  # (rotating on a rate limit); @account pins one. A loop rotates the list top-to-bottom.
  # The two frontier models at max effort, failing over to each other on a rate limit:
  # Fable 5 (the long-horizon agentic frontier) with GPT-5.6 Sol as the cross-vendor twin.
  agent: [claude:claude-fable-5/xhigh, codex:gpt-5.6-sol/xhigh]

  # prompt — OPTIONAL Markdown appended to (never replacing) the generated lead
  # contract. init scaffolds roles/lead.md; edit it, or delete it and this line.
  prompt: roles/lead.md

# roles — OPTIONAL map of role-name → role the lead can hand work to (a name is
# lowercase letters, digits, and dashes). Each role runs on its agent's DEFAULT
# account; only the lead rotates accounts. Every field is documented below.
roles:
  thinker:
    # mode: consult — a READ-ONLY peer via coop-consult. Its agent may be one
    # target or a fallback ladder; only a failed rate-limit response advances it.
    mode: consult
    # agent — a target or fallback list: provider[:model][/effort]. Terra at xhigh:
    # near-frontier deep thinking without burning the Sol/Fable quota the lead and
    # final review run on; its Opus 4.8 twin covers the same duty in loop ladders.
    agent: codex:gpt-5.6-terra/xhigh
    # when — OPTIONAL routing hints; the lead's cue for what to route here.
    when: [architecture, debugging, security, code-review, before-commit]
    # prompt — Markdown appended to the role's generated contract.
    prompt: roles/thinker.md

  critic:
    # mode: consult — a READ-ONLY peer via coop-consult for a second opinion;
    # it cannot edit files.
    mode: consult
    # agent — a target or fallback list: provider[:model][/effort].
    # Grok 4.5: the second critical opinion from OUTSIDE the claude+codex pair doing the
    # work — a third vendor's blind spots, for one-way doors and security calls.
    agent: grok:grok-4.5/high
    # when — OPTIONAL routing hints.
    when: [plan-review, tradeoffs]

  fast:
    # mode: delegate — a WRITE-CAPABLE worker via coop-delegate: it may edit the
    # worktree but never commits; the lead reviews the diff, gates, and commits.
    mode: delegate
    # agent — a target or fallback list: provider[:model][/effort]. Luna at xhigh:
    # the fast tier's lead hands; a fallback runs only if a limited rung left every
    # file and Git history unchanged.
    agent: codex:gpt-5.6-luna/xhigh
    # when — OPTIONAL routing hints.
    when: [boilerplate, bulk-edits, test-scaffolding, repo-survey]
    # commit — delegate-only; only "never" (the delegate never commits).
    commit: never
    # concurrent — delegate-only; only "never" (delegate runs are serialized).
    concurrent: never
    # prompt — OPTIONAL Markdown appended to this role's contract (see lead).
    prompt: roles/fast.md
