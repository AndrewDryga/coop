# .agent/loop.yaml — configuration for `coop loop` (committed; edit to taste).
#
# Every key is optional — omit it (or a whole section) to use coop's built-in
# default, noted below. Models use coop's target grammar,
# provider[:model][/effort][@account].
#
# Sections run in loop order:
#   preflight (before) → work → between (after each task) → signoff (at the end) → verify (after signoff accepts)

# Run every stage's box WITHOUT the shared MCP config (~/.coop/mcp.json): the servers' tool schemas
# ride at the front of every model request, so an unattended drain that never uses those tools pays
# for them each iteration. One caveat: a verify: pass whose e2e depends on MCP tooling needs mcp
# left on (repo-local e2e via bash is unaffected). One-off form: coop loop --no-mcp.
# Default: true (MCP mounts whenever mcp.json has servers).
#mcp: false

preflight:
  # Run the one-shot pre-loop queue tidy: coop itself returns blocked tasks whose decision.md now
  # has a Resolution to todo — host-side, no box, no model. Works no task, changes no code.
  # Default: false.
  #enabled: true

  # These instructions SET the cleanup job for an agent box; it spins up just
  # for them. The built-in resolved-blocker unblock already ran host-side.
  # The box may move task folders, but must not work tasks, change code, or
  # commit.
  # Default: none (the tidy stays host-side).
  #prompt: |
  #  Also drop stale screenshots under .agent/tasks/*/screenshots/.

work:
  # Model ladder for work iterations. Each rung is a TARGET (claude:opus, codex:gpt-5.6-luna) or a
  # PRESET NAME (frontier — the iteration runs under that preset: its lead ladder + roles). coop
  # rotates to the next rung on a rate limit (a preset rung's own ladder first). A bare provider
  # word (claude/codex/gemini/grok) is a target; any other bare word must name a preset.
  # Default: the who on the command line (`coop loop claude` or `coop loop frontier`) and its lead.
  #agent: [frontier, claude:opus, codex:gpt-5.6-luna]

  # Advanced: a raw command run each iteration instead of coop's agent form (disables the
  # signoff, preflight, and between passes). Default: coop's built-in agent form.
  #command: []

between:
  # Opt-in audit after EACH completed task (may reopen it before the loop moves on). Default: off.
  # Exception: a completed task that edits a gate-defining file always gets an immediate protected
  # audit, using this target/prompt when configured or the signoff target + built-in prompt otherwise.
  #enabled: true

  # Review boxes can write task queues only: the repository is read-only, then
  # every configured queue (including monorepo queues) is remounted read-write
  # so audits may reopen tasks. Use this escape hatch only when the reviewer is
  # intentionally allowed to fix source.
  # Values: tasks | repo. Default: tasks.
  #writes: repo

  # Audit model ladder. Default: the signoff model.
  #agent: [claude:sonnet]

  # The ordinary per-task audit prompt — SET it here (required when enabled).
  # coop prepends the just-finished task's id + folder, so "the task named above" is exact.
  #prompt: |
  #  Audit the task named above: confirm every acceptance criterion is demonstrably met
  #  and its failure path is tested; reopen it (move the folder back to 10_in_progress/) if not.

signoff:
  # Like every review stage, signoff writes task queues only by default. Opt
  # into source fixes only when a workflow expects final review to edit and
  # commit.
  # Values: tasks | repo. Default: tasks.
  #writes: repo

  # Work→signoff rounds before a task the signoff keeps reopening is blocked for a human.
  # Batch-scaled: the real cap is clamp(tasks_done / 2, 3, rounds). Default: 5.
  #rounds: 5

  # Model ladder for the final signoff pass. A stronger model here reviews the cheaper work loop.
  # Default: the work model.
  #agent: [codex:gpt-5.6-sol/xhigh, claude:fable]

  # Extra signoff instructions/checks, APPENDED to coop's built-in senior review (which always
  # runs — it checks goal, standards, failure-path tests, polish, and the gate). The reviewer
  # applies these on top and reopens a task that fails one. Default: nothing appended.
  #prompt: |
  #  - The changelog has an entry for any user-visible change.
  #  - The formatter/linter passes (reopen the task if it doesn't).

verify:
  # Opt-in FINAL pass, after signoff accepts the batch: it gets the run's change context (every task
  # this loop completed, by its Coop-Task trailer, with the files it touched) and does whatever the
  # prompt says — typically e2e/integration tests for the AFFECTED features. Default: off.
  #enabled: true

  # Like every review stage, verify writes task queues only by default. Opt
  # into full repository writes only when the e2e reviewer is expected to fix
  # what it finds.
  # Values: tasks | repo. Default: tasks.
  #writes: repo

  # Verify model ladder. Default: the signoff model.
  #agent: [codex:gpt-5.6-sol/xhigh]

  # The verify prompt — SET it here (verify has no built-in; required when enabled). "Affected
  # features" resolves against the injected per-task change list, so you can just say:
  #prompt: |
  #  e2e-test every feature this loop affected. Reopen the task whose e2e fails, with the failure.

# In any review prompt above (between / signoff / verify) you can PLACE the run's context inline with
# template variables — coop substitutes them before the pass runs:
#   {loop.changes}   the full per-task change block (commits + files, grouped by task)
#   {loop.tasks}     the completed task ids, comma-separated
#   {loop.affected}  the affected areas (e.g. internal/box, internal/cli)
# e.g.  prompt: |  e2e {loop.affected}; the features are the tasks: {loop.tasks}
