# .agent/loop.yaml — configuration for `coop loop` (committed; edit to taste).
# Every key is optional — omit it (or a whole section) to use coop's built-in default, noted below.
# Models use coop's target grammar: provider[:model][/effort][@account].
# Sections are in loop order: preflight (before) → work → between (after each task) → review (at the end).

preflight:
  # Run the one-shot pre-loop queue tidy (unblocks tasks whose decision.md now has a Resolution;
  # works no task, changes no code). Default: false.
  #enabled: true

  # Extra instructions APPENDED to the built-in cleanup prompt. Default: nothing appended.
  #prompt: |
  #  Also drop stale screenshots under .agent/tasks/*/screenshots/.

work:
  # Model ladder for work iterations. Each rung is a TARGET (claude:opus, codex:gpt-5.6-luna) or a
  # PRESET NAME (frontier — the iteration runs under that preset: its lead ladder + roles). coop
  # rotates to the next rung on a rate limit (a preset rung's own ladder first). A bare provider
  # word (claude/codex/gemini/grok) is a target; any other bare word must name a preset.
  # Default: the agent on the command line (`coop loop claude`) or a --preset's lead.
  #agent: [frontier, claude:opus, codex:gpt-5.6-luna]

  # Advanced: a raw command run each iteration instead of coop's agent form (disables the review,
  # preflight, and between passes). Default: coop's built-in agent form.
  #command: []

between:
  # Opt-in audit run after EACH completed task (may reopen it before the loop moves on). Default: off.
  #enabled: true

  # Audit model ladder. Default: the review model.
  #agent: [claude:sonnet]

  # The per-task audit prompt — SET it here (between has no built-in; required when enabled).
  # coop prepends the just-finished task's id + folder, so "the task named above" is exact.
  #prompt: |
  #  Audit the task named above: confirm every acceptance criterion is demonstrably met
  #  and its failure path is tested; reopen it (move the folder back to 10_in_progress/) if not.

review:
  # Work→review rounds before a task the review keeps reopening is blocked for a human.
  # Batch-scaled: the real cap is clamp(tasks_done / 2, 3, rounds). Default: 5.
  #rounds: 5

  # Model ladder for the review pass. A stronger model here reviews the cheaper work loop.
  # Default: the work model.
  #agent: [codex:gpt-5.6-sol/xhigh, claude:fable]

  # Extra review instructions/checks, APPENDED to coop's built-in senior review (which always
  # runs — it checks goal, standards, failure-path tests, polish, and the gate). The reviewer
  # applies these on top and reopens a task that fails one. Default: nothing appended.
  #prompt: |
  #  - The changelog has an entry for any user-visible change.
  #  - The formatter/linter passes (reopen the task if it doesn't).
