# GoReleaser — cross-platform release binaries published to GitHub Releases on a
# tag push. Validate locally with:  goreleaser release --snapshot --clean
version: 2

project_name: coop

before:
  hooks:
    - go mod tidy

builds:
  - id: coop
    main: .
    binary: coop
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/AndrewDryga/coop/internal/cli.Version={{ .Version }}

archives:
  - id: coop
    formats: [tar.gz]
    name_template: "coop_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

# Sign checksums.txt keyless via Sigstore/cosign, so the checksum file is itself
# tamper-evident. Verify:
#   cosign verify-blob checksums.txt --signature checksums.txt.sig \
#     --certificate checksums.txt.pem \
#     --certificate-identity-regexp 'https://github.com/AndrewDryga/coop' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    output: true

changelog:
  # Delegate to GitHub's auto-generated release notes (categorized via
  # .github/release.yml, with a "Full Changelog" compare link).
  use: github-native

release:
  github:
    owner: AndrewDryga
    name: coop
  prerelease: auto
