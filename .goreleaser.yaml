# GoReleaser — cross-platform release binaries published to GitHub Releases on a
# tag push. Validate locally with:  goreleaser release --snapshot --clean
version: 2

project_name: coop

before:
  hooks:
    - go mod tidy
    # Ship shell completions rendered from the single source (help.go) — see `coop completion`.
    - sh -c 'mkdir -p completions && go run . completion bash > completions/coop.bash && go run . completion zsh > completions/_coop'

builds:
  - id: coop
    main: .
    binary: coop
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/AndrewDryga/coop/internal/cli.Version={{ .Version }}

archives:
  - id: coop
    formats: [tar.gz]
    name_template: "coop_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - completions/*
      - docs/man/coop.1 # man page, generated from help.go by tools/gendocs (committed, -check-guarded)

checksum:
  name_template: checksums.txt

# Sign checksums.txt keyless via Sigstore/cosign, so the checksum file is itself
# tamper-evident. Modern cosign emits one bundle (signature + cert + tlog). Verify:
#   cosign verify-blob checksums.txt --bundle checksums.txt.bundle \
#     --certificate-identity-regexp '^https://github.com/AndrewDryga/coop/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    output: true

changelog:
  # Delegate to GitHub's auto-generated release notes (categorized via
  # .github/release.yml, with a "Full Changelog" compare link).
  use: github-native

release:
  github:
    owner: AndrewDryga
    name: coop
  prerelease: auto
